## ⚠️ Common Issues & Solutions
troubleshooting:
  port_conflicts:
    issue: "Port already in use"
    solution: |
      Check processes: netstat -ano | findstr :<port>
      Kill process: taskkill /PID <actual_pid> /F
      Note: Always verify actual PID with netstat first
    
  database_connection:
    issue: "Cannot connect to database"
    solution: |
      Verify Supabase credentials
      Check network connectivity
      Ensure database URL is correct in .env
  
  api_key_errors:
    issue: "AI service API key invalid"
    solution: |
      Verify OPENAI_API_KEY in .env
      Check API key validity on OpenAI dashboard
      Ensure proper billing setup

