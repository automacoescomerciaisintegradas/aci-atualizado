# Web Agent Bundle Instructions
version: "1.0"
project: "ACI Automações"
last_updated: "2026-01-14"

## 🎯 Project Overview
project_name: "ACI Automações - Marketing Automation Platform"
description: "Full-stack web application for marketing automation with AI integration"
tech_stack:
  frontend:
    framework: "React 19"
    build_tool: "Vite 6"
    language: "TypeScript 5.8"
    styling: "Tailwind CSS"
    ui_library: "Radix UI + Lucide Icons"
    state_management: "React Hooks (useState, useEffect, useContext)"
  
  backend:
    runtime: "Node.js 20"
    framework: "Express"
    orm: "Prisma"
    database: "PostgreSQL"
    auth: "JWT"
  
  ai_integration:
    - "OpenAI GPT-4"
    - "Google Gemini"
  
  deployment:
    containerization: "Docker"
    orchestration: "docker-compose"
    reverse_proxy: "Traefik"
    cloud_provider: "Supabase"

## ⚙️ Environment Configuration
required_env_vars:
  - name: "JWT_SECRET"
    description: "Secret key for JWT token generation"
    requirements: "32+ characters"
    example: "your-super-secret-jwt-key-min-32-chars"
  
  - name: "OPENAI_API_KEY"
    description: "API key for OpenAI GPT-4 integration"
    requirements: "Valid OpenAI API key"
    example: "sk-..."
  
  - name: "META_APP_ID"
    description: "Facebook/Instagram App ID for social media integration"
    requirements: "Meta Developer Platform App ID"
  
  - name: "META_APP_SECRET"
    description: "Facebook/Instagram App Secret"
    requirements: "Meta Developer Platform App Secret"
  
  - name: "PORT"
    description: "Backend server port"
    default: "4001"
  
  - name: "FRONTEND_URL"
    description: "Frontend application URL"
    default: "http://localhost:3000"

## 🚀 Development Commands
development:
  start_all: "npm run dev:all"          # Starts frontend (3000) + backend (4001)
  start_frontend: "npm run dev"         # Frontend only on port 3000
  start_backend: "npm run dev:server"   # Backend only on port 4001
  build_frontend: "npm run build"       # Build frontend to dist/
  production_start: "npm run start:prod" # Production mode

docker_commands:
  development: "docker-compose up"
  production: "docker-compose -f docker-compose.prod.yml up -d"
  rebuild: "docker-compose up --build"
  stop: "docker-compose down"

## 📁 Project Structure
directory_structure:
  root:
    - "components/"        # React components
    - "services/"          # Backend services
    - "api/"              # API endpoints
    - "hooks/"            # Custom React hooks
    - "types/"            # TypeScript definitions
    - "supabase/"         # Supabase configuration
    - "docs/"             # Documentation
    - "migrations/"       # Database migrations
    - "scripts/"          # Utility scripts
  
  components_subdirs:
    - "AdminPageComponents/"
    - "AuthPageComponents/"
    - "HomePageComponents/"
    - "Common/"
    - "ui/"

## 🔧 Key Services & Integrations
services:
  authentication:
    description: "User authentication with JWT"
    files:
      - "services/supabaseClient.ts"
      - "hooks/useAuth.ts"
  
  ai_services:
    description: "AI-powered content generation"
    files:
      - "services/aiService.ts"
      - "services/geminiService.ts"
  
  payment_integration:
    description: "Mercado Pago payment processing"
    files:
      - "services/pixPaymentService.ts"
      - "hooks/useMercadoPago.ts"
  
  automation_engine:
    description: "Marketing automation workflows"
    files:
      - "services/automationService.ts"
      - "services/automationExecutor.ts"

## 🛠️ Development Workflows

### 🔄 Daily Development Workflow
standard_development:
  morning_setup:
    description: "Setup routine for daily development"
    steps:
      - "Check for port conflicts: netstat -ano | findstr :(3000|4001)"
      - "Kill conflicting processes if needed: taskkill /PID <pid> /F"
      - "Verify .env file exists and is configured"
      - "Start development servers: npm run dev:all"
      - "Verify both frontend (3000) and backend (4001) are running"
  
  during_development:
    description: "Best practices while coding"
    practices:
      - "Commit frequently with descriptive messages"
      - "Test changes locally before pushing"
      - "Monitor browser console for errors"
      - "Check backend logs for API issues"
      - "Validate TypeScript compilation"
  
  end_of_day:
    description: "Wrap-up routine"
    steps:
      - "Stop development servers gracefully"
      - "Commit all changes"
      - "Push to remote repository"
      - "Document any issues encountered"

### 🐛 Debugging Workflow
error_resolution:
  identification:
    steps:
      - "Reproduce the error consistently"
      - "Check browser console/network tab"
      - "Check backend terminal logs"
      - "Verify environment variables"
      - "Test API endpoints directly"
  
  isolation:
    techniques:
      - "Comment out recent changes"
      - "Test in incognito/private mode"
      - "Clear browser cache and localStorage"
      - "Test with minimal reproduction case"
      - "Check database state if applicable"
  
  resolution:
    approach:
      - "Fix the root cause, not symptoms"
      - "Write tests to prevent regression"
      - "Document the solution"
      - "Verify fix doesn't break other features"

### 🚀 Feature Implementation Workflow
new_feature:
  planning:
    steps:
      - "Define feature requirements clearly"
      - "Identify affected components/files"
      - "Plan database schema changes if needed"
      - "Design API endpoints"
      - "Create implementation checklist"
  
  implementation:
    phases:
      1:
        phase: "Backend First"
        tasks:
          - "Create/update database models if needed"
          - "Implement API endpoints"
          - "Add validation and error handling"
          - "Test endpoints with Postman/curl"
      
      2:
        phase: "Frontend Integration"
        tasks:
          - "Create React components"
          - "Connect to API endpoints"
          - "Implement state management"
          - "Add loading/error states"
      
      3:
        phase: "Testing & Polish"
        tasks:
          - "End-to-end testing"
          - "Cross-browser testing"
          - "Mobile responsiveness check"
          - "Performance optimization"
  
  deployment_prep:
    checklist:
      - "Update documentation"
      - "Remove console.logs and debug code"
      - "Verify all environment variables"
      - "Test in staging environment"
      - "Prepare migration scripts if needed"

### 🐳 Docker Workflow
container_development:
  setup:
    steps:
      - "Ensure Docker Desktop is running"
      - "Verify docker-compose.yml configuration"
      - "Build images: docker-compose build"
      - "Start containers: docker-compose up"
      - "Monitor container logs: docker-compose logs -f"
  
  development_cycle:
    iterative_process:
      - "Make code changes"
      - "Rebuild specific service: docker-compose build <service>"
      - "Restart service: docker-compose restart <service>"
      - "Test changes"
      - "Repeat until satisfied"
  
