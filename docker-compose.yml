version: '3.8'

services:
  aci-app:
    image: aci-automacoes:latest
    build:
      context: .
      dockerfile: Dockerfile
    # container_name: aci-app
    # restart: unless-stopped
    env_file: .env
    # Removemos os ports expostos para o mundo, o Traefik cuidará disso via HTTPS (Porta 443)
    # Mantemos apenas se você quiser acessar via IP direto ainda
    ports:
      - "4001:4001"
      - "4050:4001"
    volumes:
      - aci-data:/app/data
      - aci-uploads:/app/uploads
    networks:
      - easypanel # Rede do Traefik/EasyPanel
      - aci-network
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=easypanel"
        - "traefik.http.routers.aci-frontend.rule=Host(`aci.automacoescomerciais.com.br`)"
        - "traefik.http.routers.aci-frontend.entrypoints=websecure"
        - "traefik.http.routers.aci-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.services.aci-frontend.loadbalancer.server.port=4001"
        - "traefik.http.routers.aci-api.rule=Host(`aci.automacoescomerciais.com.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.aci-api.entrypoints=websecure"
        - "traefik.http.routers.aci-api.tls.certresolver=letsencrypt"
        - "traefik.http.services.aci-api.loadbalancer.server.port=4001"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.aci-frontend.rule=Host(`aci.automacoescomerciais.com.br`)"
      - "traefik.http.routers.aci-frontend.entrypoints=websecure"
      - "traefik.http.routers.aci-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.aci-frontend.loadbalancer.server.port=4001"
      - "traefik.http.routers.aci-api.rule=Host(`aci.automacoescomerciais.com.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.aci-api.entrypoints=websecure"
      - "traefik.http.routers.aci-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.aci-api.loadbalancer.server.port=4001"

volumes:
  aci-data:
  aci-uploads:

networks:
  aci-network:
    driver: overlay
  easypanel:
    external: true
