<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Supabase Connection</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .success {
            color: #0f0;
        }

        .error {
            color: #f00;
        }

        .info {
            color: #0ff;
        }

        button {
            background: #1E40AF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }

        button:hover {
            background: #1E3A8A;
        }

        pre {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <h1>🔧 Teste de Conexão - Supabase</h1>

    <div id="status">
        <p class="info">⏳ Aguardando teste...</p>
    </div>

    <button onclick="testConnection()">🧪 Testar Conexão</button>
    <button onclick="testSignup()">📝 Testar Cadastro</button>

    <h2>📊 Logs:</h2>
    <pre id="logs"></pre>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://udzptgbcgzcibhbipnur.supabase.co';
        const SUPABASE_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY || 'COLE_SUA_ANON_KEY_AQUI';

        window.supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            logs.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
        }

        window.testConnection = async function () {
            document.getElementById('status').innerHTML = '<p class="info">🔄 Testando conexão...</p>';
            log('Iniciando teste de conexão...');

            try {
                log(`URL: ${SUPABASE_URL}`, 'info');
                log(`Key: ${SUPABASE_KEY.substring(0, 20)}...`, 'info');

                // Test 1: Ping
                const { data, error } = await window.supabase.from('profiles').select('count').limit(1);

                if (error) {
                    log(`❌ Erro: ${error.message}`, 'error');
                    document.getElementById('status').innerHTML = '<p class="error">❌ Conexão FALHOU</p>';
                } else {
                    log('✅ Conexão OK!', 'success');
                    document.getElementById('status').innerHTML = '<p class="success">✅ Conexão estabelecida!</p>';
                }
            } catch (err) {
                log(`❌ Erro crítico: ${err.message}`, 'error');
                document.getElementById('status').innerHTML = '<p class="error">❌ ERRO CRÍTICO</p>';
            }
        };

        window.testSignup = async function () {
            log('Testando cadastro...');

            const testEmail = `teste${Date.now()}@aci.com`;

            try {
                const { data, error } = await window.supabase.auth.signUp({
                    email: testEmail,
                    password: '123456',
                    options: {
                        data: {
                            full_name: 'Teste Usuario',
                            phone: '(11) 99999-9999',
                            role: 'user'
                        }
                    }
                });

                if (error) {
                    log(`❌ Erro no cadastro: ${error.message}`, 'error');
                } else {
                    log(`✅ Cadastro OK! User ID: ${data.user?.id}`, 'success');
                    log(`Email: ${testEmail}`, 'info');
                }
            } catch (err) {
                log(`❌ Erro: ${err.message}`, 'error');
            }
        };

        // Auto-test on load
        setTimeout(() => {
            log('='.repeat(50));
            log('Auto-testando conexão...');
            testConnection();
        }, 1000);
    </script>
</body>

</html>
